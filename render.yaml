# Render deployment for the FastAPI backend.
# Pre-built ML artifacts are committed under backend/data, so no retrain runs on
# boot — the service installs deps and serves immediately.
#
# After the frontend is live on Vercel, set CORS_ORIGINS (below) to that domain.
services:
  - type: web
    name: wc2026-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: ENVIRONMENT
        value: production
      - key: USE_DB
        value: "false"
      # Comma-separated allowed origins — real production domain + Vercel's
      # auto-generated project domain. Verified via `vercel alias ls` / `vercel
      # project ls`; update if the custom alias ever changes.
      - key: CORS_ORIGINS
        value: "https://chris-fifaworldcup26-prediction.vercel.app,https://frontend-five-iota-33.vercel.app,http://localhost:3000"
      # Auto-generated at first deploy; never committed as a real value.
      - key: JWT_SECRET
        generateValue: true
      # Not synced from this file — set explicitly in the Render dashboard
      # before the service goes live. Defaults in backend/app/config.py are
      # admin/admin and MUST NOT be left in place once this API is public.
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
